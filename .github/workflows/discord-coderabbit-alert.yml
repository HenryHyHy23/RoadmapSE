name: Discord CodeRabbit Alert

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  notify-coderabbit:
    runs-on: ubuntu-latest
    if: contains(github.event.sender.login, 'coderabbit')

    steps:
      - name: Send CodeRabbit event to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          AUTHOR: ${{ github.event.sender.login }}
          REVIEW_BODY: ${{ github.event.review.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_URL: ${{ github.event.pull_request.html_url || github.event.issue.html_url }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
          FILE_PATH: ${{ github.event.comment.path }}
          LINE: ${{ github.event.comment.line }}
          SIDE: ${{ github.event.comment.side }}
          STATE: ${{ github.event.review.state }}
        run: |
          echo "Author: $AUTHOR"

          BODY="${REVIEW_BODY:-$COMMENT_BODY}"
          SAFE_BODY=$(echo "$BODY" | head -c 3500)

          if [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            CONTENT="CodeRabbit Inline Review

Author: $AUTHOR
PR: $PR_URL
File: ${FILE_PATH:-N/A}
Line: ${LINE:-N/A}
Side: ${SIDE:-N/A}
Comment: ${COMMENT_URL:-N/A}

$SAFE_BODY"
          elif [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            CONTENT="CodeRabbit PR Review

Author: $AUTHOR
State: ${STATE:-commented}
PR: $PR_URL

$SAFE_BODY"
          else
            CONTENT="CodeRabbit Comment

Author: $AUTHOR
PR: $PR_URL
Comment: ${COMMENT_URL:-N/A}

$SAFE_BODY"
          fi

          jq -n \
            --arg content "$CONTENT" \
            '{
              username: "CodeRabbit Relay Bot",
              content: $content
            }' > payload.json

          curl -H "Content-Type: application/json" \
               -X POST \
               --data @payload.json \
               "$DISCORD_WEBHOOK_URL"
